<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyC72bXxTfYREj09h8K-WXo9G4S6atxSlc8",
    authDomain: "resumo-semanal-e61f0.firebaseapp.com",
    projectId: "resumo-semanal-e61f0",
    storageBucket: "resumo-semanal-e61f0.firebasestorage.app",
    messagingSenderId: "845737962348",
    appId: "1:845737962348:web:1cce9b2ee2e74a5ede6149",
    measurementId: "G-ZVBGFKDKLL"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();
  // Restringe o popup de login para contas @clouddog.com.br
  provider.setCustomParameters({ hd: 'clouddog.com.br' });

  const ALLOWED_DOMAIN = 'clouddog.com.br';

  function showLogin() {
    document.getElementById('app').innerHTML = `
      <div class="login-screen">
        <div class="logo-big"><span>CLOUD</span><span>DOG</span></div>
        <h2>Resumo Operacional</h2>
        <p>Acesso restrito a colaboradores CloudDog</p>
        <button class="btn-google" id="btnGoogleLogin">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Entrar com Google
        </button>
        <p class="login-error" id="loginError"></p>
      </div>
    `;
    document.getElementById('btnGoogleLogin').addEventListener('click', doLogin);
    document.getElementById('headerRight').style.display = 'none';
  }

  async function doLogin() {
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';
    try {
      const result = await auth.signInWithPopup(provider);
      const email = result.user.email || '';
      if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
        await auth.signOut();
        errorEl.textContent = 'Acesso permitido apenas para emails @clouddog.com.br';
        errorEl.style.display = 'block';
        return;
      }
    } catch (err) {
      errorEl.textContent = 'Erro ao fazer login: ' + (err.message || err);
      errorEl.style.display = 'block';
    }
  }

  // Observador de estado de auth
  auth.onAuthStateChanged((user) => {
    if (user && user.email && user.email.endsWith('@' + ALLOWED_DOMAIN)) {
      document.getElementById('headerRight').style.display = 'flex';
      document.getElementById('userPhoto').src = user.photoURL || '';
      document.getElementById('userName').textContent = user.displayName || user.email;
      // Aguarda o module estar carregado antes de iniciar o app
      function tryInit() {
        if (typeof window.initApp === 'function') {
          window.initApp();
        } else {
          setTimeout(tryInit, 50);
        }
      }
      tryInit();
    } else {
      if (user) auth.signOut(); // domínio inválido
      showLogin();
    }
  });

  document.getElementById('btnLogout').addEventListener('click', () => auth.signOut());
</script>

<script type="module">
import { GoogleGenAI } from 'https://esm.run/@google/genai';

// Expor initApp para o script de auth chamar
window.initApp = function() {

const app = document.getElementById('app');
app.innerHTML = `
<details class="config-box" id="cfgBox">
  <summary>&#x1F511; Configuracoes (API Keys e Jira)</summary>
  <div class="inner">

    <div class="field"><label>Email Jira (para integracao)</label><input type="email" id="jiraEmail" placeholder="seu.email@empresa.com"></div>
    <div class="field"><label>Jira API Token</label><input type="password" id="jiraToken" placeholder="Token gerado em id.atlassian.com"><p class="hint">Gere em <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank">id.atlassian.com</a></p></div>
    <div class="field"><label>Dominio Jira</label><input type="text" id="jiraDomain" value="clouddog.atlassian.net" placeholder="empresa.atlassian.net"></div>
    <div class="field"><label>Proxy URL (Cloudflare Worker)</label><input type="text" id="proxyUrl" placeholder="https://seu-worker.workers.dev"><p class="hint">Necessario para buscar do Jira. Veja instrucoes em worker/worker.js</p></div>
    <button type="button" id="btnSalvarCfg" style="background:#f26522;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600">Salvar Configuracoes</button>
  </div>
</details>
<div class="tabs">
  <button type="button" class="tab-btn active" data-tab="csv">&#x1F4C4; Upload CSV</button>
  <button type="button" class="tab-btn" data-tab="jira">&#x1F517; Buscar do Jira</button>
</div>
<div class="tab-content active" id="tab-csv">
  <div class="field"><label>Arquivo CSV (exportado do Jira)</label><input type="file" id="csvFile" accept=".csv"></div>
</div>
<div class="tab-content" id="tab-jira">
  <div class="field"><label>Filtro JQL</label><input type="text" id="jqlQuery" placeholder="project = CMS AND worklogDate >= -7d ORDER BY updated DESC"><p class="hint">Exemplo: project = CMS AND updated >= startOfWeek()</p></div>
  <button type="button" id="btnBuscarJira" class="btn-gerar" style="background:#2563eb;margin-bottom:12px">&#x1F50D; Buscar Issues do Jira</button>

</div>
<div class="field"><label>&#x1F3E2; Destaques de Clientes</label><textarea id="destaquesClientes" placeholder="Contextos relevantes sobre clientes (opcional)"></textarea></div>

`;

// ===== CONFIG =====
const fields = ['geminiKey','groqKey','provedor','jiraEmail','jiraToken','jiraDomain','proxyUrl'];
fields.forEach(id => {
  const el = document.getElementById(id);
  const saved = localStorage.getItem(id);
  if (saved) el.value = saved;
});
if (localStorage.getItem('geminiKey')) document.getElementById('cfgBox').removeAttribute('open');
else document.getElementById('cfgBox').setAttribute('open','');

document.getElementById('btnSalvarCfg').addEventListener('click', () => {
  fields.forEach(id => localStorage.setItem(id, document.getElementById(id).value.trim()));
  showMsg('success','Configuracoes salvas no navegador!');
  document.getElementById('cfgBox').removeAttribute('open');
});

// ===== TABS =====
let activeSource = 'csv';
let jiraCsvData = null;
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

    document.getElementById('tab-'+tab).classList.add('active');
    activeSource = tab;
  });
});

// ===== EXTRACT CLIENT =====
function extrairCliente(fields) {
  // Tenta campos comuns de Organization no Jira Service Management
  const orgFields = [fields.customfield_10002, fields.customfield_10109, fields.customfield_10004];
  for (const orgField of orgFields) {
    if (orgField) {
      // Organization pode ser array de objetos com .name ou string
      if (Array.isArray(orgField) && orgField.length > 0) {
        const nome = orgField[0].name || orgField[0].value || orgField[0];
        if (typeof nome === 'string' && nome.length > 0) return nome.replace(/,/g,' ');
      }
      if (typeof orgField === 'string' && orgField.length > 0) return orgField.replace(/,/g,' ');
      if (orgField.name) return orgField.name.replace(/,/g,' ');
      if (orgField.value) return orgField.value.replace(/,/g,' ');
    }
  }
  // Fallback: parent summary (para epics/sub-tasks)
  if (fields.parent && fields.parent.fields && fields.parent.fields.summary) {
    return fields.parent.fields.summary.replace(/,/g,' ');
  }
  return '';
}

// ===== JIRA FETCH =====
document.getElementById('btnBuscarJira').addEventListener('click', async () => {
  const email = document.getElementById('jiraEmail').value.trim() || localStorage.getItem('jiraEmail') || '';
  const token = document.getElementById('jiraToken').value.trim() || localStorage.getItem('jiraToken') || '';
  const domain = document.getElementById('jiraDomain').value.trim() || localStorage.getItem('jiraDomain') || '';
  const jql = document.getElementById('jqlQuery').value.trim();
  if (!email || !token || !domain) { showMsg('error','Preencha email, token e dominio do Jira nas configuracoes.'); return; }
  if (!jql) { showMsg('error','Informe um filtro JQL.'); return; }

  const btn = document.getElementById('btnBuscarJira');
  btn.disabled = true; btn.textContent = 'Buscando...';
  hideMsg();

  try {
    const auth = btoa(email + ':' + token);
    const proxyUrl = document.getElementById('proxyUrl').value.trim() || localStorage.getItem('proxyUrl') || '';
    if (!proxyUrl) { showMsg('error','Configure a Proxy URL (Cloudflare Worker) nas configuracoes.'); btn.disabled=false; btn.textContent='\u{1F50D} Buscar Issues do Jira'; return; }
    const jiraUrl = `https://${domain}/rest/api/3/search/jql?jql=${encodeURIComponent(jql)}&maxResults=100&fields=summary,status,assignee,worklog,customfield_10002,customfield_10109,customfield_10004,parent,reporter`;
    const res = await fetch(`${proxyUrl}?url=${encodeURIComponent(jiraUrl)}`, { headers: { 'Authorization': 'Basic ' + auth, 'Accept': 'application/json' } });
    if (!res.ok) { const e = await res.text(); throw new Error('Jira retornou ' + res.status + ': ' + e.substring(0,200)); }
    const data = await res.json();
    const issues = data.issues || [];
    if (issues.length === 0) { showMsg('error','Nenhuma issue encontrada com esse JQL.'); return; }

    // Convert issues to CSV format
    let csv = 'Data,Cliente,Resumo,Nome,Comentario,Link,Status,Horas\n';
    for (const issue of issues) {
      const f = issue.fields || {};
      const resumo = (f.summary || '').replace(/,/g,' ');
      const status = f.status ? f.status.name : '';
      const assignee = f.assignee ? f.assignee.displayName : 'Nao atribuido';
      const link = `https://${domain}/browse/${issue.key}`;
      const cliente = extrairCliente(f);
      const worklogs = f.worklog ? f.worklog.worklogs || [] : [];
      if (worklogs.length > 0) {
        for (const wl of worklogs) {
          const data = wl.started ? wl.started.substring(0,10) : '';
          const autor = wl.author ? wl.author.displayName : assignee;
          const horas = wl.timeSpentSeconds ? (wl.timeSpentSeconds / 3600).toFixed(1) : '0';
          const comentario = (wl.comment?.content?.[0]?.content?.[0]?.text || '').replace(/,/g,' ').substring(0,100);
          csv += `${data},${cliente},${resumo},${autor},${comentario},${link},${status},${horas}\n`;
        }
      } else {
        const hoje = new Date().toISOString().substring(0,10);
        csv += `${hoje},${cliente},${resumo},${assignee},,${link},${status},0\n`;
      }
    }
    jiraCsvData = csv;
    const lines = csv.trim().split('\n');
    document.getElementById('jiraPreview').style.display = 'block';
    document.getElementById('jiraPreview').textContent = `${lines.length - 1} registros encontrados.\n\nPrimeiras linhas:\n${lines.slice(0,6).join('\n')}`;
    showMsg('success', issues.length + ' issues carregadas do Jira (' + (lines.length-1) + ' registros de trabalho).');
  } catch(err) {
    console.error(err);
    showMsg('error', err.message);
  } finally {
    btn.disabled = false; btn.textContent = '\u{1F50D} Buscar Issues do Jira';
  }
});

// ===== HELPER: chamada IA com retry (Gemini ou Groq) =====
async function chamarIA(userPrompt, systemInstruction, btnEl) {
  const provedor = document.getElementById('provedor').value || localStorage.getItem('provedor') || 'gemini';
  
  if (provedor === 'groq') {
    return chamarGroq(userPrompt, systemInstruction, btnEl);
  }
  return chamarGemini(userPrompt, systemInstruction, btnEl);
}

async function chamarGroq(userPrompt, systemInstruction, btnEl, maxRetries = 3) {
  const apiKey = document.getElementById('groqKey').value.trim() || localStorage.getItem('groqKey') || '';
  if (!apiKey) throw new Error('Groq API Key nao configurada. Abra Configuracoes e informe sua key.');
  
  const models = ['llama-3.3-70b-versatile', 'llama-3.1-70b-versatile'];
  
  for (const modelo of models) {
    for (let tentativa = 1; tentativa <= maxRetries; tentativa++) {
      try {
        if (btnEl) btnEl.textContent = '\u23F3 Groq/' + modelo.split('-').slice(0,3).join('-') + ' (tentativa ' + tentativa + ')...';
        
        const groqUrl = 'https://api.groq.com/openai/v1/chat/completions';
        const proxyUrl = document.getElementById('proxyUrl').value.trim() || localStorage.getItem('proxyUrl') || '';
        const fetchUrl = proxyUrl ? proxyUrl + '?url=' + encodeURIComponent(groqUrl) : groqUrl;
        
        const res = await fetch(fetchUrl, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: modelo,
            messages: [
              { role: 'system', content: systemInstruction },
              { role: 'user', content: userPrompt }
            ],
            temperature: 0.7,
            max_tokens: 32000,
          }),
        });
        
        if (res.status === 429 || res.status === 503) {
          if (tentativa < maxRetries) {
            const espera = tentativa * 15;
            if (btnEl) btnEl.textContent = '\u23F3 Rate limit, aguardando ' + espera + 's...';
            await new Promise(r => setTimeout(r, espera * 1000));
            continue;
          }
          break; // tenta proximo modelo
        }
        
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error('Groq erro ' + res.status + ': ' + (errData.error?.message || 'desconhecido'));
        }
        
        const data = await res.json();
        const text = data.choices?.[0]?.message?.content || '';
        if (text) return { text };
      } catch (err) {
        console.error('Groq tentativa ' + tentativa + ' erro:', err.message);
        if (err.message && err.message.includes('Groq erro')) throw err;
        // CORS ou rede — propaga imediatamente para mostrar ao usuario
        if (err.message && (err.message.includes('Failed to fetch') || err.message.includes('NetworkError'))) {
          throw new Error('Groq: erro de conexao. Verifique se a Proxy URL esta configurada e se o Worker aceita api.groq.com. Erro: ' + err.message);
        }
        if (tentativa === maxRetries) break;
      }
    }
  }
  throw new Error('Limite do Groq atingido. Tente novamente em alguns minutos.');
}

async function chamarGemini(userPrompt, systemInstruction, btnEl, maxRetries = 3) {
  const apiKey = document.getElementById('geminiKey').value.trim() || localStorage.getItem('geminiKey') || '';
  if (!apiKey) throw new Error('Gemini API Key nao configurada. Abra Configuracoes e informe sua key.');
  
  const ai = new GoogleGenAI({ apiKey });
  const models = ['gemini-2.5-flash', 'gemini-2.0-flash'];
  
  for (const m of models) {
    for (let tentativa = 1; tentativa <= maxRetries; tentativa++) {
      try {
        if (btnEl) btnEl.textContent = '\u23F3 ' + m + ' (tentativa ' + tentativa + ')...';
        const response = await ai.models.generateContent({
          model: m,
          contents: userPrompt,
          config: { systemInstruction, temperature: 0.7, maxOutputTokens: 65536 },
        });
        if (response.text) return response;
      } catch (err) {
        const code = err?.error?.code || err?.status || 0;
        const isRateLimit = code === 429 || code === 503 || (err.message && err.message.includes('RESOURCE_EXHAUSTED'));
        
        if (isRateLimit && tentativa < maxRetries) {
          const espera = tentativa * 30;
          if (btnEl) btnEl.textContent = '\u23F3 Limite, aguardando ' + espera + 's...';
          await new Promise(r => setTimeout(r, espera * 1000));
          continue;
        }
        if (isRateLimit) break;
        throw err;
      }
    }
  }
  throw new Error('Limite da API Gemini atingido. Tente Groq como alternativa ou aguarde o reset diario.');
}

document.getElementById('btnGerar').addEventListener('click', async () => {
  let csvRaw = '';
  if (activeSource === 'csv') {
    const fileInput = document.getElementById('csvFile');
    if (!fileInput.files || !fileInput.files[0]) { showMsg('error','Selecione um arquivo CSV.'); return; }
    csvRaw = await fileInput.files[0].text();
  } else {
    if (!jiraCsvData) { showMsg('error','Busque as issues do Jira primeiro.'); return; }
    csvRaw = jiraCsvData;
  }

  const btn = document.getElementById('btnGerar');
  btn.disabled = true; btn.textContent = '\u23F3 Gerando... (pode levar ate 1 minuto)';
  hideMsg();
  document.getElementById('resultado').classList.remove('visible');

  try {
    const destClientes = document.getElementById('destaquesClientes').value;
    const destProf = document.getElementById('destaquesProfissionais').value;
    let obs = '';
    if (destClientes.trim()) obs += 'Destaques de Clientes:\n' + destClientes + '\n\n';
    if (destProf.trim()) obs += 'Destaques de Profissionais:\n' + destProf + '\n\n';

    let userPrompt = 'Lista de atividades (CSV):\n\n' + csvRaw;
    if (obs) userPrompt += '\n\nObservacoes do gestor:\n' + obs;
    userPrompt += '\n\nGere o JSON estruturado conforme instruido.';

    let relatorioData = null;
    const provedor = document.getElementById('provedor').value || localStorage.getItem('provedor') || 'gemini';
    
    // Tenta provedor principal, se falhar tenta o outro
    const tentativas = [provedor, provedor === 'gemini' ? 'groq' : 'gemini'];
    
    for (const prov of tentativas) {
      try {
        if (prov === 'groq') {
          const groqKey = document.getElementById('groqKey').value.trim() || localStorage.getItem('groqKey') || '';
          if (!groqKey) { if (prov !== provedor) continue; throw new Error('Groq API Key nao configurada.'); }
        }
        if (prov === 'gemini') {
          const gemKey = document.getElementById('geminiKey').value.trim() || localStorage.getItem('geminiKey') || '';
          if (!gemKey) { if (prov !== provedor) continue; throw new Error('Gemini API Key nao configurada.'); }
        }
        
        if (btn) btn.textContent = '\u23F3 Gerando via ' + prov + '...';
        const response = prov === 'groq' 
          ? await chamarGroq(userPrompt, RELATORIO_HTML_PROMPT, btn)
          : await chamarGemini(userPrompt, RELATORIO_HTML_PROMPT, btn);

        const jsonText = response.text;
        if (!jsonText) throw new Error('Sem resposta.');

        const cleanJson = jsonText.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
        try {
          relatorioData = JSON.parse(cleanJson);
        } catch(parseErr) {
          // Tenta recuperar JSON truncado
          let fixed = cleanJson;
          fixed = fixed.replace(/,"[^"]*"?:?"?[^"{}[\]]*$/, '');
          fixed = fixed.replace(/,\s*"[^"]*$/, '');
          const opens = (fixed.match(/[{[]/g) || []).length;
          const closes = (fixed.match(/[}\]]/g) || []).length;
          for (let i = 0; i < opens - closes; i++) {
            fixed += fixed.lastIndexOf('{') > fixed.lastIndexOf('[') ? '}' : ']';
          }
          relatorioData = JSON.parse(fixed); // se falhar, cai no catch externo
          showMsg('info','Resposta parcial recuperada via ' + prov + '.');
        }
        
        if (relatorioData) break; // sucesso
      } catch(provErr) {
        console.warn(prov + ' falhou:', provErr.message);
        // Se é o provedor que o usuario escolheu e nao é erro de JSON truncado, mostra o erro direto
        if (prov === provedor && !provErr.message.includes('resposta incompleta') && !provErr.message.includes('JSON')) {
          throw provErr;
        }
        if (prov === tentativas[tentativas.length - 1]) throw provErr; // ultimo, propaga erro
        if (btn) btn.textContent = '\u23F3 ' + prov + ' falhou, tentando alternativa...';
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    // Gerar texto markdown a partir do JSON estruturado
    relatorioMd = jsonToMarkdown(relatorioData);
    // Gerar HTML visual
    relatorioVisualHTML = buildRelatorioVisualHTML(relatorioData);

    // Renderizar preview
    document.getElementById('relatorioHtml').innerHTML = marked.parse(relatorioMd);
    document.getElementById('resultado').classList.add('visible');
    showMsg('success', 'Relatorio gerado! ' + (relatorioData.metricas?.totalAtividades || '?') + ' atividades processadas.');
  } catch(err) {
    console.error(err);
    showMsg('error', err.message);
  } finally {
    btn.disabled = false; btn.textContent = '\u26A1 Gerar Relatorio';
  }
});

// Converte o JSON estruturado em texto Markdown para copiar/PDF
function jsonToMarkdown(r) {
  let md = '# Resumo Gerencial - Cloud Management Services\n\n';
  md += '**Periodo:** ' + (r.periodo || '?') + '\n\n';
  md += '## 1. Sumario Executivo\n\n';
  md += (r.sumarioExecutivo?.texto || '') + '\n\n';
  md += (r.sumarioExecutivo?.focoEstrategico || '') + '\n\n';
  md += '## 2. Distribuicao do Esforco Operacional\n\n';
  for (const p of (r.distribuicaoEsforco?.pilares || [])) {
    md += '- **' + p.nome + ' (' + p.percentual + '%):** ' + p.descricao + '\n';
  }
  md += '\n## 3. Destaques Estrategicos por Pilar\n\n';
  md += '### A. Seguranca e Governanca\n\n';
  for (const i of (r.seguranca || [])) { md += '- **' + i.cliente + ' — ' + i.titulo + ':** ' + i.descricao + '\n'; }
  md += '\n### B. Otimizacao de Custos (FinOps)\n\n';
  for (const i of (r.finops || [])) { md += '- **' + i.cliente + ' — ' + i.titulo + ':** ' + i.descricao + '\n'; }
  md += '\n### C. Modernizacao e Redes\n\n';
  for (const i of (r.modernizacao || [])) { md += '- **' + i.cliente + ' — ' + i.titulo + ':** ' + i.descricao + '\n'; }
  md += '\n### D. Observabilidade, Performance e Resiliencia\n\n';
  for (const i of (r.observabilidade || [])) { md += '- **' + i.cliente + ' — ' + i.titulo + ':** ' + i.descricao + '\n'; }
  md += '\n## 4. Destaques Operacionais e Relacionamento\n\n';
  for (const i of (r.relacionamento || [])) { md += '- **' + i.cliente + '** (' + i.status + '): ' + i.destaque + '\n'; }
  md += '\n## 5. Destaque dos Profissionais\n\n';
  for (const p of (r.profissionais || [])) { md += '- **' + p.nome + ':** ' + p.descricao + '\n'; }
  return md;
}

  if (!container) return;
  if (historico.length === 0) { container.innerHTML = '<p style="color:#888;font-size:.85rem">Nenhum relatorio salvo.</p>'; return; }

window._carregarRel = function(id) {
  const historico = JSON.parse(localStorage.getItem('historico_relatorios') || '[]');
  const item = historico.find(h => h.id === id);
  if (!item) return;
  relatorioMd = item.md;
  relatorioVisualHTML = item.html || null;
  document.getElementById('relatorioHtml').innerHTML = marked.parse(relatorioMd);
  document.getElementById('resultado').classList.add('visible');
  showMsg('success','Relatorio de ' + item.data + ' carregado.');
};
window._excluirRel = function(id) {
  if (!confirm('Excluir este relatorio do historico?')) return;
  let historico = JSON.parse(localStorage.getItem('historico_relatorios') || '[]');
  historico = historico.filter(h => h.id !== id);
  localStorage.setItem('historico_relatorios', JSON.stringify(historico));
  renderHistorico();
  showMsg('success','Relatorio excluido.');
};

<section id="seguranca" class="section"><h2>Seguranca e Governanca</h2><div class="card"><h3>Destaques por Cliente</h3><div class="items-list">` + (r.seguranca||[]).map(i => '<div class="item-entry"><div class="item-icon">\u{1F512}</div><div class="item-body"><strong>'+i.cliente+' - '+i.titulo+'</strong><p>'+i.descricao+'</p></div></div>').join('') + `</div></div></section>
<section id="finops" class="section"><h2>Otimizacao de Custos (FinOps)</h2><div class="card"><h3>Destaques por Cliente</h3><div class="items-list">` + (r.finops||[]).map(i => '<div class="item-entry"><div class="item-icon">\u{1F4C9}</div><div class="item-body"><strong>'+i.cliente+' - '+i.titulo+'</strong><p>'+i.descricao+'</p></div></div>').join('') + `</div></div></section>
<section id="modernizacao" class="section"><h2>Modernizacao e Redes</h2><div class="card"><h3>Destaques por Cliente</h3><div class="items-list">` + (r.modernizacao||[]).map(i => '<div class="item-entry"><div class="item-icon">\u{2601}</div><div class="item-body"><strong>'+i.cliente+' - '+i.titulo+'</strong><p>'+i.descricao+'</p></div></div>').join('') + `</div></div></section>
<section id="observabilidade" class="section"><h2>Observabilidade, Performance e Resiliencia</h2><div class="card"><h3>Destaques por Cliente</h3><div class="items-list">` + (r.observabilidade||[]).map(i => '<div class="item-entry"><div class="item-icon">\u{1F4C8}</div><div class="item-body"><strong>'+i.cliente+' - '+i.titulo+'</strong><p>'+i.descricao+'</p></div></div>').join('') + `</div></div></section>
<section id="relacionamento" class="section"><h2>Destaques Operacionais e Relacionamento</h2><div class="card"><h3>Status dos Clientes</h3><div class="table-wrapper"><table><thead><tr><th>Cliente</th><th>Status</th><th>Destaque</th></tr></thead><tbody>` + (r.relacionamento||[]).map(i => {const sc=i.status==='Critico'||i.status==='Crítico'?'status-critico':i.status.includes('evolu')?'status-evolucao':'status-positivo';return '<tr><td><strong>'+i.cliente+'</strong></td><td><span class="badge '+sc+'">'+i.status+'</span></td><td>'+i.destaque+'</td></tr>';}).join('') + `</tbody></table></div></div></section>
<section id="profissionais" class="section"><h2>Destaque dos Profissionais</h2><div class="profissionais-grid">` + (r.profissionais||[]).map(p => '<div class="prof-card"><div class="prof-avatar">'+(p.iniciais||p.nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase())+'</div><div class="prof-info"><strong>'+p.nome+'</strong><p>'+p.descricao+'</p></div></div>').join('') + `</div></section>
</main>
<` + `script>
const pc=['#3b82f6','#10b981','#f59e0b','#8b5cf6'];
new Chart(document.getElementById('chartPilares'),{type:'doughnut',data:{labels:` + pilarLabels + `,datasets:[{data:` + pilarValues + `,backgroundColor:pc,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
new Chart(document.getElementById('chartComp'),{type:'bar',data:{labels:` + pilarLabels + `,datasets:[{data:` + pilarValues + `,backgroundColor:pc,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:'%'}}}}});
const secs=document.querySelectorAll('.section');const navs=document.querySelectorAll('.nav-links a');
window.addEventListener('scroll',()=>{let cur='';secs.forEach(s=>{if(window.scrollY>=s.offsetTop-120)cur=s.id;});navs.forEach(a=>{a.classList.remove('active');if(a.getAttribute('href')==='#'+cur)a.classList.add('active');});});
<` + `/script></body></html>`;
}

}; // fim de window.initApp
</script>
