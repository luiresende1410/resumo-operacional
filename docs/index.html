<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyC72bXxTfYREj09h8K-WXo9G4S6atxSlc8",
    authDomain: "resumo-semanal-e61f0.firebaseapp.com",
    projectId: "resumo-semanal-e61f0",
    storageBucket: "resumo-semanal-e61f0.firebasestorage.app",
    messagingSenderId: "845737962348",
    appId: "1:845737962348:web:1cce9b2ee2e74a5ede6149",
    measurementId: "G-ZVBGFKDKLL"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();
  // Restringe o popup de login para contas @clouddog.com.br
  provider.setCustomParameters({ hd: 'clouddog.com.br' });

  const ALLOWED_DOMAIN = 'clouddog.com.br';

  function showLogin() {
    document.getElementById('app').innerHTML = `
      <div class="login-screen">
        <div class="logo-big"><span>CLOUD</span><span>DOG</span></div>
        <h2>Resumo Operacional</h2>
        <p>Acesso restrito a colaboradores CloudDog</p>
        <button class="btn-google" id="btnGoogleLogin">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Entrar com Google
        </button>
        <p class="login-error" id="loginError"></p>
      </div>
    `;
    document.getElementById('btnGoogleLogin').addEventListener('click', doLogin);
    document.getElementById('headerRight').style.display = 'none';
  }

  async function doLogin() {
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';
    try {
      const result = await auth.signInWithPopup(provider);
      const email = result.user.email || '';
      if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
        await auth.signOut();
        errorEl.textContent = 'Acesso permitido apenas para emails @clouddog.com.br';
        errorEl.style.display = 'block';
        return;
      }
    } catch (err) {
      errorEl.textContent = 'Erro ao fazer login: ' + (err.message || err);
      errorEl.style.display = 'block';
    }
  }

  // Observador de estado de auth
  auth.onAuthStateChanged((user) => {
    if (user && user.email && user.email.endsWith('@' + ALLOWED_DOMAIN)) {
      document.getElementById('headerRight').style.display = 'flex';
      document.getElementById('userPhoto').src = user.photoURL || '';
      document.getElementById('userName').textContent = user.displayName || user.email;
      // Aguarda o module estar carregado antes de iniciar o app
      function tryInit() {
        if (typeof window.initApp === 'function') {
          window.initApp();
        } else {
          setTimeout(tryInit, 50);
        }
      }
      tryInit();
    } else {
      if (user) auth.signOut(); // domínio inválido
      showLogin();
    }
  });

  document.getElementById('btnLogout').addEventListener('click', () => auth.signOut());
</script>

<script type="module">
import { GoogleGenAI } from 'https://esm.run/@google/genai';

// Expor initApp para o script de auth chamar
window.initApp = function() {

const app = document.getElementById('app');
app.innerHTML = `

    <button type="button" id="btnSalvarCfg" style="background:#f26522;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600">Salvar Configuracoes</button>

</details>
<div class="tabs">

</div>
<div class="tab-content active" id="tab-csv">
  <div class="field"><label>Arquivo CSV (exportado do Jira)</label><input type="file" id="csvFile" accept=".csv"></div>
</div>
<div class="tab-content" id="tab-jira">
  <div class="field"><label>Filtro JQL</label><input type="text" id="jqlQuery" placeholder="project = CMS AND worklogDate >= -7d ORDER BY updated DESC"><p class="hint">Exemplo: project = CMS AND updated >= startOfWeek()</p></div>
  <button type="button" id="btnBuscarJira" class="btn-gerar" style="background:#2563eb;margin-bottom:12px">&#x1F50D; Buscar Issues do Jira</button>

// ===== CONFIG =====
const fields = ['geminiKey','groqKey','provedor','jiraEmail','jiraToken','jiraDomain','proxyUrl'];
fields.forEach(id => {
  const el = document.getElementById(id);
  const saved = localStorage.getItem(id);
  if (saved) el.value = saved;
});
if (localStorage.getItem('geminiKey')) document.getElementById('cfgBox').removeAttribute('open');
else document.getElementById('cfgBox').setAttribute('open','');

document.getElementById('btnSalvarCfg').addEventListener('click', () => {
  fields.forEach(id => localStorage.setItem(id, document.getElementById(id).value.trim()));
  showMsg('success','Configuracoes salvas no navegador!');
  document.getElementById('cfgBox').removeAttribute('open');
});

// ===== TABS =====
let activeSource = 'csv';
let jiraCsvData = null;
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-'+tab).classList.add('active');
    activeSource = tab;
  });

// ===== EXTRACT CLIENT =====
function extrairCliente(fields) {
  // Tenta campos comuns de Organization no Jira Service Management
  const orgFields = [fields.customfield_10002, fields.customfield_10109, fields.customfield_10004];
  for (const orgField of orgFields) {
    if (orgField) {
      // Organization pode ser array de objetos com .name ou string
      if (Array.isArray(orgField) && orgField.length > 0) {
        const nome = orgField[0].name || orgField[0].value || orgField[0];
        if (typeof nome === 'string' && nome.length > 0) return nome.replace(/,/g,' ');
      }
      if (typeof orgField === 'string' && orgField.length > 0) return orgField.replace(/,/g,' ');
      if (orgField.name) return orgField.name.replace(/,/g,' ');
      if (orgField.value) return orgField.value.replace(/,/g,' ');
    }
  }
  // Fallback: parent summary (para epics/sub-tasks)
  if (fields.parent && fields.parent.fields && fields.parent.fields.summary) {
    return fields.parent.fields.summary.replace(/,/g,' ');
  }
  return '';
}

// ===== JIRA FETCH =====
document.getElementById('btnBuscarJira').addEventListener('click', async () => {
  const email = document.getElementById('jiraEmail').value.trim() || localStorage.getItem('jiraEmail') || '';
  const token = document.getElementById('jiraToken').value.trim() || localStorage.getItem('jiraToken') || '';
  const domain = document.getElementById('jiraDomain').value.trim() || localStorage.getItem('jiraDomain') || '';
  const jql = document.getElementById('jqlQuery').value.trim();
  if (!email || !token || !domain) { showMsg('error','Preencha email, token e dominio do Jira nas configuracoes.'); return; }
  if (!jql) { showMsg('error','Informe um filtro JQL.'); return; }

  const btn = document.getElementById('btnBuscarJira');
  btn.disabled = true; btn.textContent = 'Buscando...';
  hideMsg();

  try {
    const auth = btoa(email + ':' + token);
    const proxyUrl = document.getElementById('proxyUrl').value.trim() || localStorage.getItem('proxyUrl') || '';
    if (!proxyUrl) { showMsg('error','Configure a Proxy URL (Cloudflare Worker) nas configuracoes.'); btn.disabled=false; btn.textContent='\u{1F50D} Buscar Issues do Jira'; return; }
    const jiraUrl = `https://${domain}/rest/api/3/search/jql?jql=${encodeURIComponent(jql)}&maxResults=100&fields=summary,status,assignee,worklog,customfield_10002,customfield_10109,customfield_10004,parent,reporter`;
    const res = await fetch(`${proxyUrl}?url=${encodeURIComponent(jiraUrl)}`, { headers: { 'Authorization': 'Basic ' + auth, 'Accept': 'application/json' } });
    if (!res.ok) { const e = await res.text(); throw new Error('Jira retornou ' + res.status + ': ' + e.substring(0,200)); }
    const data = await res.json();
    const issues = data.issues || [];
    if (issues.length === 0) { showMsg('error','Nenhuma issue encontrada com esse JQL.'); return; }

    // Convert issues to CSV format
    let csv = 'Data,Cliente,Resumo,Nome,Comentario,Link,Status,Horas\n';
    for (const issue of issues) {
      const f = issue.fields || {};
      const resumo = (f.summary || '').replace(/,/g,' ');
      const status = f.status ? f.status.name : '';
      const assignee = f.assignee ? f.assignee.displayName : 'Nao atribuido';
      const link = `https://${domain}/browse/${issue.key}`;
      const cliente = extrairCliente(f);
      const worklogs = f.worklog ? f.worklog.worklogs || [] : [];
      if (worklogs.length > 0) {
        for (const wl of worklogs) {
          const data = wl.started ? wl.started.substring(0,10) : '';
          const autor = wl.author ? wl.author.displayName : assignee;
          const horas = wl.timeSpentSeconds ? (wl.timeSpentSeconds / 3600).toFixed(1) : '0';
          const comentario = (wl.comment?.content?.[0]?.content?.[0]?.text || '').replace(/,/g,' ').substring(0,100);
          csv += `${data},${cliente},${resumo},${autor},${comentario},${link},${status},${horas}\n`;
        }
      } else {
        const hoje = new Date().toISOString().substring(0,10);
        csv += `${hoje},${cliente},${resumo},${assignee},,${link},${status},0\n`;
      }
    }
    jiraCsvData = csv;
    const lines = csv.trim().split('\n');
    document.getElementById('jiraPreview').style.display = 'block';
    document.getElementById('jiraPreview').textContent = `${lines.length - 1} registros encontrados.\n\nPrimeiras linhas:\n${lines.slice(0,6).join('\n')}`;
    showMsg('success', issues.length + ' issues carregadas do Jira (' + (lines.length-1) + ' registros de trabalho).');
  } catch(err) {
    console.error(err);
    showMsg('error', err.message);
  } finally {
    btn.disabled = false; btn.textContent = '\u{1F50D} Buscar Issues do Jira';
  }
});

// ===== HELPER: chamada IA com retry (Gemini ou Groq) =====
async function chamarIA(userPrompt, systemInstruction, btnEl) {
  const provedor = document.getElementById('provedor').value || localStorage.getItem('provedor') || 'gemini';
  
  if (provedor === 'groq') {
    return chamarGroq(userPrompt, systemInstruction, btnEl);
  }
  return chamarGemini(userPrompt, systemInstruction, btnEl);
}

async function chamarGroq(userPrompt, systemInstruction, btnEl, maxRetries = 3) {
  const apiKey = document.getElementById('groqKey').value.trim() || localStorage.getItem('groqKey') || '';
  if (!apiKey) throw new Error('Groq API Key nao configurada. Abra Configuracoes e informe sua key.');
  
  const models = ['llama-3.3-70b-versatile', 'llama-3.1-70b-versatile'];
  
  for (const modelo of models) {
    for (let tentativa = 1; tentativa <= maxRetries; tentativa++) {
      try {
        if (btnEl) btnEl.textContent = '\u23F3 Groq/' + modelo.split('-').slice(0,3).join('-') + ' (tentativa ' + tentativa + ')...';
        
        const groqUrl = 'https://api.groq.com/openai/v1/chat/completions';
        const proxyUrl = document.getElementById('proxyUrl').value.trim() || localStorage.getItem('proxyUrl') || '';
        const fetchUrl = proxyUrl ? proxyUrl + '?url=' + encodeURIComponent(groqUrl) : groqUrl;
        
        const res = await fetch(fetchUrl, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: modelo,
            messages: [
              { role: 'system', content: systemInstruction },
              { role: 'user', content: userPrompt }
            ],
            temperature: 0.7,
            max_tokens: 8000,
          }),
        });
        
        if (res.status === 429 || res.status === 503) {
          if (tentativa < maxRetries) {
            const espera = tentativa * 15;
            if (btnEl) btnEl.textContent = '\u23F3 Rate limit, aguardando ' + espera + 's...';
            await new Promise(r => setTimeout(r, espera * 1000));
            continue;
          }
          break; // tenta proximo modelo
        }
        
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error('Groq erro ' + res.status + ': ' + (errData.error?.message || 'desconhecido'));
        }
        
        const data = await res.json();
        const text = data.choices?.[0]?.message?.content || '';
        if (text) return { text };
      } catch (err) {
        console.error('Groq tentativa ' + tentativa + ' erro:', err.message);
        if (err.message && err.message.includes('Groq erro')) throw err;
        // CORS ou rede — propaga imediatamente para mostrar ao usuario
        if (err.message && (err.message.includes('Failed to fetch') || err.message.includes('NetworkError'))) {
          throw new Error('Groq: erro de conexao. Verifique se a Proxy URL esta configurada e se o Worker aceita api.groq.com. Erro: ' + err.message);
        }
        if (tentativa === maxRetries) break;
      }
    }
  }
  throw new Error('Limite do Groq atingido. Tente novamente em alguns minutos.');
}

async function chamarGemini(userPrompt, systemInstruction, btnEl, maxRetries = 3) {
  const apiKey = document.getElementById('geminiKey').value.trim() || localStorage.getItem('geminiKey') || '';
  if (!apiKey) throw new Error('Gemini API Key nao configurada. Abra Configuracoes e informe sua key.');
  
  const ai = new GoogleGenAI({ apiKey });
  const models = ['gemini-2.5-flash', 'gemini-2.0-flash'];
  
  for (const m of models) {
    for (let tentativa = 1; tentativa <= maxRetries; tentativa++) {
      try {
        if (btnEl) btnEl.textContent = '\u23F3 ' + m + ' (tentativa ' + tentativa + ')...';
        const response = await ai.models.generateContent({
          model: m,
          contents: userPrompt,
          config: { systemInstruction, temperature: 0.7, maxOutputTokens: 65536 },
        });
        if (response.text) return response;
      } catch (err) {
        const code = err?.error?.code || err?.status || 0;
        const isRateLimit = code === 429 || code === 503 || (err.message && err.message.includes('RESOURCE_EXHAUSTED'));
        
        if (isRateLimit && tentativa < maxRetries) {
          const espera = tentativa * 30;
          if (btnEl) btnEl.textContent = '\u23F3 Limite, aguardando ' + espera + 's...';
          await new Promise(r => setTimeout(r, espera * 1000));
          continue;
        }
        if (isRateLimit) break;
        throw err;
      }
    }
  }
  throw new Error('Limite da API Gemini atingido. Tente Groq como alternativa ou aguarde o reset diario.');
}

function calcularMetricasTimeLocal(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return { totalAtividades: 0, totalHoras: 0, totalClientes: 0, totalProfissionais: 0, mediaHorasPorProfissional: 0, horasPorCliente: {}, horasPorProfissional: {} };
  const sep = lines[0].includes(';') ? ';' : ',';
  const cols = lines[0].split(sep).map(c => c.trim().toLowerCase().replace(/"/g, ''));
  const iCliente = cols.findIndex(c => c.includes('cliente') || c.includes('organiz'));
  const iNome = cols.findIndex(c => c.includes('nome') || c.includes('responsavel') || c.includes('assignee'));
  const iHoras = cols.findIndex(c => c.includes('hora') || c.includes('hours') || c.includes('tempo'));
  const iStatus = cols.findIndex(c => c.includes('status'));

  const horasPorCliente = {};
  const horasPorProfissional = {};
  const atividadesPorStatus = {};
  let totalHoras = 0;
  let totalAtividades = 0;

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const parts = splitCSVLine(lines[i], sep);
    if (parts.length < 2) continue;
    totalAtividades++;
    const cliente = (iCliente >= 0 && parts[iCliente]) ? parts[iCliente].trim() : 'Sem cliente';
    const nome = (iNome >= 0 && parts[iNome]) ? parts[iNome].trim() : 'Nao identificado';
    const horas = (iHoras >= 0 && parts[iHoras]) ? (parseFloat(parts[iHoras].replace(',', '.')) || 0) : 0;
    const status = (iStatus >= 0 && parts[iStatus]) ? parts[iStatus].trim() : 'Sem status';
    totalHoras += horas;
    horasPorCliente[cliente] = (horasPorCliente[cliente] || 0) + horas;
    horasPorProfissional[nome] = (horasPorProfissional[nome] || 0) + horas;
    atividadesPorStatus[status] = (atividadesPorStatus[status] || 0) + 1;
  }

  const totalClientes = Object.keys(horasPorCliente).length;
  const totalProfissionais = Object.keys(horasPorProfissional).length;
  return {
    totalAtividades,
    totalHoras: Math.round(totalHoras * 10) / 10,
    totalClientes,
    totalProfissionais,
    mediaHorasPorProfissional: totalProfissionais > 0 ? Math.round((totalHoras / totalProfissionais) * 10) / 10 : 0,
    horasPorCliente,
    horasPorProfissional,
    atividadesPorStatus,
  };
}

function resumoTimeToMarkdown(r) {

  md += '## KPIs\n\n';
  if (r.kpis) {
    md += '| Indicador | Valor |\n|-----------|-------|\n';
    md += '| Atividades | ' + r.kpis.totalAtividades + ' |\n';
    md += '| Horas Trabalhadas | ' + r.kpis.totalHoras + 'h |\n';
    md += '| Clientes Atendidos | ' + r.kpis.totalClientes + ' |\n';
    md += '| Profissionais | ' + r.kpis.totalProfissionais + ' |\n';
    md += '| Media por Profissional | ' + r.kpis.mediaHorasPorProfissional + 'h |\n\n';
  }
  md += '## Esforco por Pilar\n\n';
  for (const p of (r.atividadesPorPilar || [])) {
    md += '### ' + p.pilar + ' (' + p.percentual + '% - ' + p.horas + 'h)\n\n';
    for (const d of (p.destaques || [])) md += '- ' + d + '\n';
    md += '\n';
  }
  md += '## Principais Entregas da Semana\n\n';
  md += '| # | Atividade | Cliente | Profissional | Horas | Impacto |\n|---|-----------|---------|--------------|-------|----------|\n';
  for (const [i, a] of (r.topAtividades || []).entries()) {
    md += '| ' + (i+1) + ' | ' + a.titulo + ' | ' + a.cliente + ' | ' + a.profissional + ' | ' + a.horas + 'h | ' + a.impacto + ' |\n';
  }
  md += '\n## Volume por Cliente\n\n';
  md += '| Cliente | Atividades | Horas | Principais Entregas |\n|---------|------------|-------|---------------------|\n';
  for (const c of (r.atividadesPorCliente || [])) {
    md += '| ' + c.cliente + ' | ' + c.atividades + ' | ' + c.horas + 'h | ' + (c.principaisEntregas || []).join('; ') + ' |\n';
  }
  md += '\n## Destaques do Time\n\n';
  for (const p of (r.destaquesProfissionais || [])) {
    md += '### ' + p.nome + '\n\n';
    md += '- ' + p.atividades + ' atividades | ' + p.horas + 'h | ' + (p.clientes || []).length + ' cliente(s)\n';
    md += '- ' + p.destaque + '\n\n';
  }
  return md;
}

// Extrai lista de atividades brutas do CSV (Key/Link, Resumo, Assignee)
function extrairAtividadesCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  const sep = lines[0].includes(';') ? ';' : ',';
  const cols = lines[0].split(sep).map(c => c.trim().toLowerCase().replace(/"/g, ''));
  
  const iKey = cols.findIndex(c => c.includes('key') || c.includes('link') || c.includes('chave'));
  const iResumo = cols.findIndex(c => c.includes('resumo') || c.includes('summary') || c.includes('descri'));
  const iNome = cols.findIndex(c => c.includes('nome') || c.includes('responsavel') || c.includes('assignee'));
  
  const atividades = [];
  const vistos = new Set();
  
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const parts = splitCSVLine(lines[i], sep);
    
    let key = (iKey >= 0 && parts[iKey]) ? parts[iKey].trim() : '';
    const resumo = (iResumo >= 0 && parts[iResumo]) ? parts[iResumo].trim() : '';
    const nome = (iNome >= 0 && parts[iNome]) ? parts[iNome].trim() : '';
    
    // Extrair so a chave do link (AWS-37680)
    if (key.includes('/browse/')) {
      key = key.split('/browse/').pop().split('?')[0].split('#')[0];
    } else if (key.includes('atlassian.net')) {
      key = key.split('/').pop().split('?')[0];
    }
    
    if (!resumo) continue;
    const id = resumo.substring(0, 60);
    if (vistos.has(id)) continue;
    vistos.add(id);
    
    atividades.push({ key, resumo, assignee: nome });
  }
  return atividades;
}

// Split CSV respeitando campos entre aspas
function splitCSVLine(line, sep) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === sep && !inQuotes) {
      result.push(current.replace(/^"|"$/g, '').trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.replace(/^"|"$/g, '').trim());
  return result;
}

// Converte o JSON estruturado em texto Markdown para copiar/PDF
function jsonToMarkdown(r, atividadesBrutas) {
  let md = '# Services Book - Cloud Management Services\n\n';
  md += '**Cliente:** ' + (r.cliente || '?') + '\n\n';
  md += '**Periodo:** ' + (r.periodo || '?') + ' | ' + (r.totalAtividades || 0) + ' atividades | ' + (r.totalHoras || 0) + ' horas\n\n';
  md += '## Sumario Executivo\n\n' + (r.sumarioExecutivo || '') + '\n\n';
  md += '## Distribuicao do Esforco\n\n';
  for (const p of (r.pilares || [])) {
    md += '- **' + p.nome + ' (' + p.percentual + '%):** ' + (p.descricaoResumo || '') + '\n';
  }
  md += '\n';
  for (const p of (r.pilares || [])) {
    md += '## ' + p.nome + ' (' + p.horasDedicadas + 'h)\n\n';
    for (const a of (p.atividades || [])) {
      md += '### ' + (a.icone || '') + ' ' + a.titulo + ' (' + a.horas + 'h)\n\n';
      md += a.descricao + '\n\n';
    }
  }
  // Anexo: lista de atividades brutas
  if (atividadesBrutas && atividadesBrutas.length > 0) {
    md += '---\n\n## Anexo: Lista de Atividades\n\n';
    md += '| Key | Resumo | Responsavel |\n|-----|--------|-------------|\n';
    for (const a of atividadesBrutas) {
      md += '| ' + a.key + ' | ' + a.resumo + ' | ' + a.assignee + ' |\n';
    }
  }
  return md;
}

// Resume CSV agrupando atividades para reduzir tokens
function resumirCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return csv;
  
  // Detecta separador (virgula ou ponto-virgula)
  const header = lines[0];
  const sep = header.includes(';') ? ';' : ',';
  const cols = header.split(sep).map(c => c.trim().toLowerCase().replace(/"/g, ''));
  
  const iCliente = cols.findIndex(c => c.includes('cliente') || c.includes('organiz'));
  const iNome = cols.findIndex(c => c.includes('nome') || c.includes('responsavel') || c.includes('assignee'));
  const iResumo = cols.findIndex(c => c.includes('resumo') || c.includes('summary') || c.includes('descri'));
  const iStatus = cols.findIndex(c => c.includes('status'));
  const iHoras = cols.findIndex(c => c.includes('hora') || c.includes('hours') || c.includes('tempo'));
  const iData = cols.findIndex(c => c.includes('data') || c.includes('date'));
  
  // Agrupa por cliente
  const porCliente = {};
  const datas = [];
  let totalHoras = 0;
  
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const parts = splitCSVLine(lines[i], sep);
    if (parts.length < 2) continue;
    
    const cliente = (iCliente >= 0 && parts[iCliente]) ? parts[iCliente] : 'Sem cliente';
    const nome = (iNome >= 0 && parts[iNome]) ? parts[iNome] : '?';
    const resumo = (iResumo >= 0 && parts[iResumo]) ? parts[iResumo] : '';
    const status = (iStatus >= 0 && parts[iStatus]) ? parts[iStatus] : '';
    const horas = (iHoras >= 0 && parts[iHoras]) ? (parseFloat(parts[iHoras].replace(',', '.')) || 0) : 0;
    const data = (iData >= 0 && parts[iData]) ? parts[iData] : '';
    
    if (data) datas.push(data);
    totalHoras += horas;
    
    if (!porCliente[cliente]) porCliente[cliente] = { horas: 0, atividades: [], profissionais: {} };
    porCliente[cliente].horas += horas;
    if (resumo) porCliente[cliente].atividades.push(resumo + (status ? ' ['+status+']' : ''));
    if (!porCliente[cliente].profissionais[nome]) porCliente[cliente].profissionais[nome] = 0;
    porCliente[cliente].profissionais[nome] += horas;
  }
  
  datas.sort();
  let resultado = 'Periodo: ' + (datas[0] || '?') + ' a ' + (datas[datas.length-1] || '?') + '\n';
  resultado += 'Total: ' + (lines.length-1) + ' atividades, ' + Math.round(totalHoras*10)/10 + ' horas\n\n';
  
  for (const [cliente, info] of Object.entries(porCliente)) {
    resultado += '## ' + cliente + ' (' + Math.round(info.horas*10)/10 + 'h)\n';
    resultado += 'Profissionais: ' + Object.entries(info.profissionais).map(([n,h]) => n+' ('+Math.round(h*10)/10+'h)').join(', ') + '\n';
    resultado += 'Atividades:\n';
    const atv = info.atividades.slice(0, 5);
    for (const a of atv) resultado += '- ' + a.substring(0, 80) + '\n';
    if (info.atividades.length > 5) resultado += '- ... e mais ' + (info.atividades.length - 5) + ' atividades\n';
    resultado += '\n';
  }
  
  // Limita tamanho total para caber nos limites de tokens das APIs gratuitas
  if (resultado.length > 5000) {
    resultado = resultado.substring(0, 5000) + '\n\n[... resumo truncado por limite de tamanho]';
  }
  
  return resultado;
}
