<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumo Operacional - Cloud Management Services</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 20px 32px;
      gap: 20px;
      border-bottom: 1px solid #333;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #f26522;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo span {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 11px;
      font-weight: 900;
      color: white;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }

    .container {
      max-width: 800px;
      width: 100%;
      margin: 32px auto;
      padding: 0 24px;
      flex: 1;
    }

    .field {
      margin-bottom: 24px;
    }

    .field label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 8px;
    }

    .field textarea {
      width: 100%;
      min-height: 120px;
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 12px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
    }

    .field textarea:focus {
      outline: none;
      border-color: #f26522;
    }

    .field textarea::placeholder {
      color: #666;
    }

    .field input[type="file"] {
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 12px;
      width: 100%;
      cursor: pointer;
    }

    .field input[type="file"]::-webkit-file-upload-button {
      background: #f26522;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 12px;
    }

    .btn-gerar {
      background: #f26522;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 24px;
    }

    .btn-gerar:hover:not(:disabled) {
      background: #e05a1a;
    }

    .btn-gerar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .msg.error {
      background: #3a1a1a;
      border: 1px solid #dc2626;
      color: #fca5a5;
    }

    .msg.success {
      background: #1a2e1a;
      border: 1px solid #16a34a;
      color: #86efac;
    }

    .msg.info {
      background: #1a1a2e;
      border: 1px solid #2563eb;
      color: #93c5fd;
    }

    .resultado {
      display: none;
      margin-bottom: 32px;
    }

    .resultado.visible {
      display: block;
    }

    .resultado h3 {
      font-size: 0.95rem;
      color: #ccc;
      margin-bottom: 12px;
    }

    .resultado-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .resultado-actions button {
      background: #2d2d2d;
      border: 1px solid #555;
      color: #e0e0e0;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .resultado-actions button:hover {
      border-color: #f26522;
    }

    .resultado pre {
      background: #111;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 16px;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #ccc;
    }

    .footer {
      padding: 12px 32px;
      border-top: 3px solid #f26522;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .footer .logo-sm {
      width: 32px;
      height: 32px;
      background: #f26522;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .footer .logo-sm span {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 6px;
      font-weight: 900;
      color: white;
      line-height: 1.1;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <span>CLOUD</span>
      <span>DOG</span>
    </div>
    <h1>Resumo Operacional - Cloud Management Services</h1>
  </div>

  <div class="container">
    <form id="form">
      <div class="field">
        <label>📄 Arquivo CSV (exportado do Jira)</label>
        <input type="file" id="csvFile" accept=".csv">
      </div>

      <div class="field">
        <label>📅 Período do Relatório</label>
        <input type="text" id="periodo" placeholder="Ex: 14/07 a 18/07/2026" style="width:100%;background:#2d2d2d;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:12px;font-size:0.9rem;font-family:inherit;">
        <small style="color:#666;font-size:0.75rem;margin-top:4px;display:block;">Informe o período que será exibido no relatório</small>
      </div>

      <div class="field">
        <label>🏢 Destaques de Clientes</label>
        <textarea id="destaquesClientes" placeholder="Informe contextos relevantes sobre clientes da semana (opcional).&#10;Exemplo:&#10;- ACME: iniciamos migração crítica para nova região&#10;- BETA: incidente resolvido em menos de 30min"></textarea>
      </div>

      <div class="field">
        <label>👤 Destaques de Profissionais</label>
        <textarea id="destaquesProfissionais" placeholder="Informe destaques sobre a equipe (opcional).&#10;Exemplo:&#10;- João: liderou a resposta ao incidente&#10;- Maria: entregou documentação antes do prazo"></textarea>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
        <button type="button" class="btn-gerar" id="btnGerarHTML" style="background:#2563eb;margin-bottom:0;">📘 Book de Serviços</button>
        <button type="button" class="btn-gerar" id="btnGerarTime" style="background:#059669;margin-bottom:0;">📊 Relatório de Gestão</button>
      </div>
    </form>

    <div class="msg" id="msg"></div>

    <div class="resultado" id="resultado" style="display:none;margin-bottom:32px;">
      <div class="resultado-actions" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
        <button type="button" id="btnAbrirHTML">🌐 Abrir no Navegador</button>
        <button type="button" id="btnBaixarHTML">💾 Baixar HTML</button>
        <button type="button" id="btnExportarPDF">📄 Exportar PDF</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="logo-sm">
      <span>CLOUD</span>
      <span>DOG</span>
    </div>
  </div>

  <script>
    var msg = document.getElementById('msg');
    var resultado = document.getElementById('resultado');
    var ultimoHTML = null;

    function showMsg(type, text) {
      msg.style.display = 'block';
      msg.className = 'msg ' + type;
      msg.textContent = text;
    }

    function hideMsg() {
      msg.style.display = 'none';
      msg.className = 'msg';
      msg.textContent = '';
    }

    function getFormData() {
      var fileInput = document.getElementById('csvFile');
      if (!fileInput.files || !fileInput.files[0]) {
        showMsg('error', '❌ Selecione um arquivo CSV antes de gerar.');
        return null;
      }
      var formData = new FormData();
      formData.append('csv', fileInput.files[0]);
      formData.append('periodo', document.getElementById('periodo').value);
      formData.append('destaquesClientes', document.getElementById('destaquesClientes').value);
      formData.append('destaquesProfissionais', document.getElementById('destaquesProfissionais').value);
      return formData;
    }

    function mostrarResultado(html, titulo) {
      ultimoHTML = html;
      resultado.style.display = 'block';
      showMsg('success', '✅ ' + titulo + ' gerado! Use os botões abaixo para visualizar ou baixar.');
    }

    // Book de Serviços
    document.getElementById('btnGerarHTML').addEventListener('click', function() {
      var formData = getFormData();
      if (!formData) return;

      var btn = this;
      btn.disabled = true;
      btn.textContent = '⏳ Gerando Book de Serviços...';
      hideMsg();
      resultado.style.display = 'none';

      fetch('/api/gerar-html', { method: 'POST', body: formData })
        .then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok) throw new Error(data.error || 'Erro HTTP ' + response.status);
            return data;
          });
        })
        .then(function(data) {
          mostrarResultado(data.relatorioHTML, 'Book de Serviços');
        })
        .catch(function(err) {
          showMsg('error', '❌ ' + err.message);
        })
        .finally(function() {
          btn.disabled = false;
          btn.textContent = '📘 Book de Serviços';
        });
    });

    // Relatório de Gestão
    document.getElementById('btnGerarTime').addEventListener('click', function() {
      var formData = getFormData();
      if (!formData) return;

      var btn = this;
      btn.disabled = true;
      btn.textContent = '⏳ Gerando Relatório de Gestão...';
      hideMsg();
      resultado.style.display = 'none';

      fetch('/api/gerar-resumo-time', { method: 'POST', body: formData })
        .then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok) throw new Error(data.error || 'Erro HTTP ' + response.status);
            return data;
          });
        })
        .then(function(data) {
          mostrarResultado(data.resumoHTML, 'Relatório de Gestão');
        })
        .catch(function(err) {
          showMsg('error', '❌ ' + err.message);
        })
        .finally(function() {
          btn.disabled = false;
          btn.textContent = '📊 Relatório de Gestão';
        });
    });

    // Ações de resultado
    document.getElementById('btnAbrirHTML').addEventListener('click', function() {
      if (ultimoHTML) {
        var blob = new Blob([ultimoHTML], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');
      }
    });

    document.getElementById('btnBaixarHTML').addEventListener('click', function() {
      if (ultimoHTML) {
        var blob = new Blob([ultimoHTML], { type: 'text/html' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'relatorio-' + new Date().toISOString().split('T')[0] + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    });

    document.getElementById('btnExportarPDF').addEventListener('click', function() {
      if (ultimoHTML) {
        var pdfHTML = ultimoHTML.replace('</body>', '<script>window.onload=function(){window.print()}<\/script></body>');
        var blob = new Blob([pdfHTML], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');
      }
    });
  </script>
</body>
</html>
